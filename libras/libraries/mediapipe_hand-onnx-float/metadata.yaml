model_files:
  HandDetector.onnx:
    inputs:
      image:
        shape: [1, 3, 256, 256]
        dtype: float32
    outputs:
      box_coords:
        shape: [1, 2944, 18]
        dtype: float32
      box_scores:
        shape: [1, 2944, 1]
        dtype: float32
  HandLandmarkDetector.onnx:
    inputs:
      image:
        shape: [1, 3, 256, 256]
        dtype: float32
    outputs:
      scores:
        shape: [1]
        dtype: float32
      lr:
        shape: [1]
        dtype: float32
      landmarks:
        shape: [1, 21, 3]
        dtype: float32
